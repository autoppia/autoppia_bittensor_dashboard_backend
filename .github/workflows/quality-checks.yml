name: Quality checks

on:
  push:
    branches: [main, master, 'fix/**']
  pull_request:
    branches: [main, master, 'fix/**']

jobs:
  lint-and-audit:
    name: Lint & dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "ruff==0.10.0" pip-audit radon

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      # Maintainability report: cyclomatic complexity (C901), too many args/statements. Tune in pyproject; add to extend-select to fail.
      - name: Ruff maintainability report
        run: ruff check app scripts --select C901,PLR0913,PLR0915 --output-format=concise
        continue-on-error: true

      - name: Radon cyclomatic complexity
        run: |
          echo "=== Cyclomatic complexity (app, scripts) ==="
          radon cc app scripts -a -s --total-average

      - name: Radon maintainability index
        run: |
          echo "=== Maintainability index (app, scripts) ==="
          radon mi app scripts -s

      # Complexity gate: radon cc grades A(1-5) B(6-10) C(11-20) D(21-30) E(31-40) F(41+).
      # -n F = fail only on F (41+). Use -n E to fail on E or F; -n D to fail on D/E/F.
      # To fix: refactor (extract functions, reduce if/elif/for/while/and/or branches). Remove continue-on-error when ready to enforce.
      - name: Radon complexity gate (app only, fail on F)
        continue-on-error: true
        run: |
          bad=$(radon cc app -n F --no-assert 2>/dev/null | grep -c . || true)
          if [ "${bad:-0}" -gt 0 ]; then
            echo "::error::app/ has cyclomatic complexity F (41+). Run 'radon cc app -n F' locally to list. Refactor: extract functions, reduce branches."
            radon cc app -n F --no-assert
            exit 1
          fi

      # Maintainability: fail if any app module is C or worse (A/B = pass).
      - name: Radon maintainability gate (app only, fail if below B)
        run: |
          bad=$(radon mi app -n C 2>/dev/null | grep -c . || true)
          if [ "${bad:-0}" -gt 0 ]; then
            echo "::error::app/ has maintainability index C or worse (threshold: min B). Run 'radon mi app -n C' locally to list."
            radon mi app -n C
            exit 1
          fi

      - name: Dependency audit
        run: pip-audit
        continue-on-error: true

  test-and-coverage:
    name: Tests & coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term -v
        env:
          RUN_LIVE_TESTS: ""

      - name: Coverage summary in job
        run: |
          python -c "
          import os
          import xml.etree.ElementTree as ET
          root = ET.parse('coverage.xml').getroot()
          pct = float(root.get('line-rate', 0)) * 100
          lines_covered = int(root.get('lines-covered', 0))
          lines_valid = int(root.get('lines-valid', 0))
          path = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if path:
              with open(path, 'a') as f:
                  f.write('## Test coverage\n\n')
                  f.write(f'- **Lines:** {lines_covered}/{lines_valid} ({pct:.1f}%)\n\n')
                  f.write('Ver log del paso *Run tests with coverage* para detalle por archivo.\n')
          "

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files
