name: Test Coverage

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  coverage_check:
    runs-on: ubuntu-latest
    name: Run Tests & Coverage
    permissions:
      contents: read
      pull-requests: write
      issues: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: autoppia_user
          POSTGRES_PASSWORD: autoppia_password
          POSTGRES_DB: autoppia_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U autoppia_user -d autoppia_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql+asyncpg://autoppia_user:autoppia_password@127.0.0.1:5432/autoppia_db
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest with coverage gating
        run: |
          pytest --cov=app --cov-config=.coveragerc --cov-report=xml --cov-fail-under=90

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: coverage.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '89 90'

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request' && always() && github.event.pull_request.head.repo.full_name == github.repository
        with:
          recreate: true
          path: code-coverage-results.md
