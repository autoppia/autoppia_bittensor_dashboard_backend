# SonarCloud project configuration
sonar.projectKey=autoppia_autoppia_bittensor_dashboard_backend
sonar.organization=autoppia

# Project metadata
sonar.projectName=Autoppia Bittensor Dashboard Backend
sonar.projectVersion=0.1.0

# Source code location
sonar.sources=app,scripts
sonar.tests=tests

# Exclusions - reduce lines analyzed and avoid noise
sonar.exclusions=\
**/__pycache__/**,\
**/*.pyc,\
**/*.pyo,\
**/*.pyd,\
**/.pytest_cache/**,\
**/*.egg-info/**,\
**/node_modules/**,\
**/docs/**,\
**/*.md,\
**/*.txt,\
**/*.json,\
**/*.jsonl,\
**/*.log,\
**/.venv/**,\
**/venv/**,\
**/env/**,\
**/.idea/**,\
**/build/**,\
**/.vscode/**,\
**/.scannerwork/**,\
**/dist/**,\
**/data/**,\
**/images/**,\
**/assets/**

# Python settings
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.11
sonar.sourceEncoding=UTF-8

# Test and coverage exclusions
sonar.test.exclusions=**/test_*.py,**/*_test.py,**/conftest.py
sonar.coverage.exclusions=**/tests/**,**/test_*.py,**/conftest.py,**/__init__.py
