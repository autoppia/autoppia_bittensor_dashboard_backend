# SonarCloud Project Configuration
sonar.projectKey=autoppia_autoppia_bittensor_dashboard_backend
sonar.organization=autoppia

# Project metadata
sonar.projectName=Autoppia Bittensor Dashboard Backend
sonar.projectVersion=0.1.0

# Source code paths (Python)
sonar.sources=app,scripts

# Test paths
sonar.tests=tests

# Exclusions
# Python bytecode and cache
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/*.pyo,**/*.pyd,**/.pytest_cache/**,**/*.egg-info/**

# Node and third-party
sonar.exclusions+=**/node_modules/**

# Documentation and non-code files
sonar.exclusions+=**/docs/**,**/*.md,**/*.txt,**/*.json,**/*.jsonl,**/*.log,**/*.gif,**/*.webm,**/*.png,**/*.jpg,**/*.jpeg

# Virtual environments
sonar.exclusions+=**/.venv/**,**/venv/**,**/env/**,**/.env**

# IDE and build artifacts
sonar.exclusions+=**/.idea/**,**/build/**,**/.vscode/**,**/.scannerwork/**,**/dist/**

# Data and assets
sonar.exclusions+=**/data/**,**/images/**,**/assets/**

# Test coverage exclusions
sonar.coverage.exclusions=**/tests/**,**/test_*.py,**/conftest.py,**/__init__.py

# Coverage report path (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Python-specific settings
sonar.python.version=3.11

# Encoding
sonar.sourceEncoding=UTF-8

# OWASP SARIF is passed only in CI via workflow (-Dsonar.sarifReportPaths=...) when the report exists
