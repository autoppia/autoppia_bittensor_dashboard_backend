services:
  redis:
    image: redis:7-alpine
    container_name: autoppia-redis
    restart: unless-stopped

    # Puerto Redis - solo localhost para seguridad
    ports:
      - "127.0.0.1:6379:6379"

    # Persistencia de datos
    volumes:
      - ./data/redis:/data

    # Pasar la contraseña como variable de entorno para el healthcheck
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}

    # Configuración de Redis - solo usa requirepass si hay contraseña
    command: >
      sh -c "
      if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes --save 60 1000 --maxmemory 2gb --maxmemory-policy allkeys-lru
      else
        redis-server --appendonly yes --save 60 1000 --maxmemory 2gb --maxmemory-policy allkeys-lru
      fi
      "

    # Limitar logs para no llenar disco
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Health check - usa contraseña si está configurada
    healthcheck:
      test: >
        sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-cli -a \"$$REDIS_PASSWORD\" ping
        else
          redis-cli ping
        fi
        "
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

    # Recursos límite (opcional, ajustar según necesidad)
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

# Volumen para persistencia
volumes:
  redis_data:
    driver: local
