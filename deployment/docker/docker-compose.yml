version: "3.8"

services:
  # FastAPI application
  api:
    build: .
    container_name: leaderboard-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      API_KEYS: '["dev-token-123","staging-456","prod-789"]'
      DEBUG: "false"
    networks:
      - leaderboard-network
    volumes:
      - ./app:/app/app:ro # Mount app code for development

networks:
  leaderboard-network:
    driver: bridge
